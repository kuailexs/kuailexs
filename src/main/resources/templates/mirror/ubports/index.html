<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>快乐相随</title>
    <link rel="stylesheet" th:href="@{/mirror.ubports/blog.css}" type="text/css" />
</head>
<body>
    <div class="mirror-ubports-blog-wrap">
        <div th:each="blog,memberStat:${page.list}" class="card-body">
            <a th:href="@{/mirror.ubports/blog/}+${blog.id}">
                <h4 th:text="${blog.blogTitle}">Ubuntu Touch Q&amp;A 54</h4>
            </a>
            <p class="hidden-sm hidden-xs"  th:text="${blog.subtitle}">OTA-10 Sprint</p>
        </div>
        <div style="clear: both"></div>
    </div>
    <div class="mirror-ubports-blog-wrap">
        <!--   引入分页 -->
        <div id="page" th:attr="url=@{/mirror.ubports/blog/list(type=${type})}"></div>
        <div th:replace="page::myPage"></div>
    </div>
</body>
</html>
